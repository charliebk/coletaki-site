<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 375 812" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <title>Coletaki — App Cidadã (Denunciar vertido ilegal)</title>
  <defs>
    <linearGradient id="phoneBezel2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#000"/>
    </linearGradient>
  </defs>
  <rect width="375" height="812" rx="40" fill="url(#phoneBezel2)"/>
  <rect x="6" y="6" width="363" height="800" rx="34" fill="#FAFAF7"/>
  <rect x="130" y="6" width="115" height="28" rx="14" fill="#000"/>
  <g transform="translate(20, 50)">
    <g transform="translate(0, 8)"><path d="M 8 0 L 0 8 L 8 16" fill="none" stroke="#1F2A30" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></g>
    <text x="40" y="22" font-size="14" font-weight="700" fill="#1F2A30">Denunciar vertido ilegal</text>
  </g>
  <g transform="translate(20, 92)">
    <rect width="335" height="4" rx="2" fill="#E5E5E0"/>
    <rect width="112" height="4" rx="2" fill="#DC2626"/>
    <circle cx="0" cy="20" r="6" fill="#DC2626"/>
    <text x="0" y="23" fill="#FAFAF7" font-weight="700" text-anchor="middle" font-size="9">1</text>
    <text x="0" y="42" fill="#DC2626" font-weight="700" text-anchor="middle" font-size="9">Tipo</text>
    <circle cx="167" cy="20" r="6" fill="#FAFAF7" stroke="#D9D9D2" stroke-width="1.5"/>
    <text x="167" y="23" font-weight="600" text-anchor="middle" font-size="9" fill="#7A7A6E">2</text>
    <text x="167" y="42" text-anchor="middle" font-size="9" fill="#7A7A6E">Detalhes</text>
    <circle cx="335" cy="20" r="6" fill="#FAFAF7" stroke="#D9D9D2" stroke-width="1.5"/>
    <text x="335" y="23" font-weight="600" text-anchor="middle" font-size="9" fill="#7A7A6E">3</text>
    <text x="335" y="42" text-anchor="middle" font-size="9" fill="#7A7A6E">Enviar</text>
  </g>
  <g transform="translate(20, 168)">
    <text font-size="18" font-weight="700" fill="#1F2A30" letter-spacing="-0.3">Qual o tipo de vertido?</text>
    <text y="22" font-size="11" fill="#7A7A6E">Sua denúncia é anônima e protegida pela LGPD.</text>
    <text y="38" font-size="11" fill="#7A7A6E">Selecione a categoria mais próxima.</text>
  </g>
  <g transform="translate(20, 232)">
    <rect width="335" height="78" rx="12" fill="#FEF2F2" stroke="#DC2626" stroke-width="2"/>
    <g transform="translate(18, 18)"><rect width="44" height="44" rx="8" fill="#FECACA"/></g>
    <text x="78" y="32" font-size="14" font-weight="700" fill="#7F1D1D">Entulho e escombros</text>
    <text x="78" y="50" font-size="10" fill="#7F1D1D" opacity="0.75">Material de construção, demolição,</text>
    <text x="78" y="63" font-size="10" fill="#7F1D1D" opacity="0.75">caçambas abandonadas, móveis velhos.</text>
    <circle cx="310" cy="39" r="11" fill="#DC2626"/>
    <path d="M 305 39 L 309 43 L 316 35" stroke="#FAFAF7" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g transform="translate(20, 322)">
    <rect width="335" height="78" rx="12" fill="#FFFFFF" stroke="#E5E5E0"/>
    <g transform="translate(18, 18)"><rect width="44" height="44" rx="8" fill="#F3E8FF"/></g>
    <text x="78" y="32" font-size="14" font-weight="700" fill="#1F2A30">Resíduos perigosos</text>
    <text x="78" y="50" font-size="10" fill="#7A7A6E">Óleos, tintas, produtos químicos,</text>
    <text x="78" y="63" font-size="10" fill="#7A7A6E">pilhas, lâmpadas, hospitalares.</text>
  </g>
  <g transform="translate(20, 412)">
    <rect width="335" height="78" rx="12" fill="#FFFFFF" stroke="#E5E5E0"/>
    <g transform="translate(18, 18)"><rect width="44" height="44" rx="8" fill="#FFEDD5"/></g>
    <text x="78" y="32" font-size="14" font-weight="700" fill="#1F2A30">Lixo em local irregular</text>
    <text x="78" y="50" font-size="10" fill="#7A7A6E">Descarte em terreno baldio, beira</text>
    <text x="78" y="63" font-size="10" fill="#7A7A6E">de rio, mata, praia, estrada.</text>
  </g>
  <g transform="translate(20, 502)">
    <rect width="335" height="78" rx="12" fill="#FFFFFF" stroke="#E5E5E0"/>
    <g transform="translate(18, 18)"><rect width="44" height="44" rx="8" fill="#FEF3C7"/></g>
    <text x="78" y="32" font-size="14" font-weight="700" fill="#1F2A30">Outros / não sei</text>
    <text x="78" y="50" font-size="10" fill="#7A7A6E">Não tem certeza? Selecione esta</text>
    <text x="78" y="63" font-size="10" fill="#7A7A6E">opção e descreva nos detalhes.</text>
  </g>
  <g transform="translate(20, 600)">
    <rect width="335" height="56" rx="10" fill="#FFFBEB" stroke="#FCD34D"/>
    <g transform="translate(16, 16)"><circle r="10" fill="#F4A261"/><text y="4" font-size="13" font-weight="700" fill="#FAFAF7" text-anchor="middle">!</text></g>
    <text x="44" y="22" font-size="10" font-weight="700" fill="#78350F">Emergência ambiental?</text>
    <text x="44" y="36" font-size="9" fill="#1F2A30">Em caso de vazamento perigoso ou risco imediato</text>
    <text x="44" y="48" font-size="9" fill="#1F2A30">à saúde, ligue para o 193 (Bombeiros) ou 190.</text>
  </g>
  <g transform="translate(20, 680)">
    <rect width="335" height="48" rx="24" fill="#DC2626"/>
    <text x="167" y="30" font-size="14" font-weight="700" fill="#FAFAF7" text-anchor="middle">Continuar →</text>
  </g>
  <rect x="125" y="794" width="125" height="4" rx="2" fill="#1F2A30"/>
</svg>
